<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Group Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f13;
      --surface:    #1e1e26;
      --surface2:   #26262f;
      --border:     #33333f;
      --text:       #e8e8f0;
      --muted:      #7a7a9a;
      --accent:     #6c63ff;
      --chatgpt:    #10a37f;
      --gemini:     #4285f4;
      --claude:     #d97757;
      --user-bg:    #2d2b52;
      --user-bdr:   #3d3a72;
      --error:      #ef4444;
      --stream-bdr: #fbbf24;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; line-height: 1.5;
    }

    #app { display: grid; grid-template-rows: auto auto auto 1fr auto; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    header h1 { font-size: 15px; font-weight: 700; color: #a78bfa; white-space: nowrap; }

    .mode-bar { display: flex; gap: 5px; }
    .mode-btn {
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
      background: transparent; color: var(--muted); cursor: pointer; font-size: 12px;
      transition: all .15s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--text); }
    .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    #round-badge {
      display: none; padding: 3px 10px; border: 1px solid var(--accent);
      border-radius: 20px; font-size: 11px; color: #a78bfa; font-weight: 600;
    }
    #new-topic-btn {
      margin-left: auto; padding: 4px 12px; border: 1px solid var(--border);
      border-radius: 20px; background: transparent; color: var(--muted);
      cursor: pointer; font-size: 12px; transition: all .15s;
    }
    #new-topic-btn:hover { border-color: var(--error); color: #fca5a5; }

    /* ── Order bar ── */
    #order-bar {
      display: flex; align-items: center; gap: 10px; padding: 7px 16px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      font-size: 12px; flex-wrap: wrap;
    }
    #order-bar .label { color: var(--muted); white-space: nowrap; }
    .order-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .order-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 20px;
      background: var(--surface);
    }
    .chip-num {
      width: 16px; height: 16px; border-radius: 50%; background: var(--border);
      font-size: 10px; font-weight: 700; display: flex; align-items: center;
      justify-content: center; color: var(--muted);
    }
    .chip-name { font-size: 12px; font-weight: 600; }
    .chip-name.chatgpt { color: var(--chatgpt); }
    .chip-name.gemini  { color: var(--gemini); }
    .chip-name.claude  { color: var(--claude); }

    .order-btn {
      padding: 0 4px; border: 1px solid var(--border); border-radius: 3px;
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: 11px; line-height: 16px; transition: all .1s;
    }
    .order-btn:hover:not(:disabled) { border-color: #a78bfa; color: var(--text); }
    .order-btn:disabled { opacity: .3; cursor: not-allowed; }

    .dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-idle     { background: var(--border); }
    .dot-ready    { background: #22c55e; }
    .dot-thinking { background: var(--stream-bdr); animation: blink 1s infinite; }
    .dot-waiting  { background: var(--border); }
    .dot-done     { background: #22c55e; }
    .dot-error    { background: var(--error); }
    .dot-skip     { background: transparent; border: 1px dashed var(--border); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .order-sep { color: var(--border); font-size: 14px; }

    /* ── Status bar ── */
    #status-bar {
      padding: 5px 16px; font-size: 12px; color: var(--muted);
      background: var(--bg); border-bottom: 1px solid var(--border); min-height: 26px;
    }

    /* ── Chat thread ── */
    #chat-thread {
      overflow-y: auto; padding: 16px; display: flex;
      flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }
    #chat-thread::-webkit-scrollbar { width: 4px; }
    #chat-thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Round separator */
    .round-sep {
      display: flex; align-items: center; gap: 8px; margin: 10px 0 4px;
    }
    .round-sep::before, .round-sep::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .round-sep-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* Message rows */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; padding: 2px 0; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; flex-shrink: 0; user-select: none;
    }
    .ai-avatar.ai-chatgpt { background: var(--chatgpt); color: #fff; }
    .ai-avatar.ai-gemini  { background: var(--gemini);  color: #fff; }
    .ai-avatar.ai-claude  { background: var(--claude);  color: #fff; }
    .user-avatar          { background: var(--accent);  color: #fff; }

    .msg-content { max-width: 68%; display: flex; flex-direction: column; gap: 2px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .msg-sender {
      font-size: 11px; font-weight: 600; padding: 0 6px;
    }
    .msg-sender.chatgpt { color: var(--chatgpt); }
    .msg-sender.gemini  { color: var(--gemini); }
    .msg-sender.claude  { color: var(--claude); }
    .msg-sender.user    { color: #a78bfa; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 18px;
      white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.6;
    }

    /* AI bubble — left */
    .msg-row.ai .msg-bubble {
      border-bottom-left-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border);
    }
    /* User bubble — right */
    .msg-row.user .msg-bubble {
      border-bottom-right-radius: 4px;
      background: var(--user-bg); border: 1px solid var(--user-bdr);
    }

    .msg-bubble.streaming { border-color: var(--stream-bdr); }

    /* Typing indicator */
    .typing-bubble {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 12px 16px; min-width: 56px;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: typing-bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typing-bounce {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    .msg-bubble.error { background: #2a1515; border-color: var(--error); color: #fca5a5; }

    /* ── Input area ── */
    #input-area {
      padding: 10px 16px; background: var(--surface);
      border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;
    }
    #continue-row { display: none; justify-content: center; }
    #continue-btn {
      padding: 6px 20px; background: transparent; border: 1px solid var(--accent);
      border-radius: 20px; color: #a78bfa; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    #continue-btn:hover { background: var(--accent); color: #fff; }

    #input-row { display: flex; gap: 8px; align-items: flex-end; }
    #topic-input {
      flex: 1; resize: none; background: var(--bg); border: 1px solid var(--border);
      border-radius: 22px; color: var(--text); font-family: inherit; font-size: 14px;
      padding: 10px 16px; line-height: 1.5; min-height: 44px; max-height: 120px;
      outline: none; transition: border-color .15s;
    }
    #topic-input:focus { border-color: var(--accent); }
    #topic-input::placeholder { color: var(--muted); }

    #send-btn {
      padding: 10px 20px; background: var(--accent); color: #fff; border: none;
      border-radius: 22px; font-size: 14px; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: background .15s, opacity .15s;
    }
    #send-btn:hover:not(:disabled) { background: #7c73ff; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .hint { font-size: 11px; color: var(--muted); }
    .hint code { background: var(--border); padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>AI Group Chat</h1>
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="brainstorm">Brainstorm</button>
      <button class="mode-btn" data-mode="debate">Debate</button>
      <button class="mode-btn" data-mode="commentary">Commentary</button>
    </div>
    <span id="round-badge"></span>
    <button id="new-topic-btn">New Topic</button>
  </header>

  <div id="order-bar">
    <span class="label">Response order:</span>
    <div class="order-chips">

      <div class="order-chip">
        <span class="chip-num" id="order-gemini">1</span>
        <span class="chip-name gemini">Gemini</span>
        <span class="dot dot-idle" id="dot-gemini"></span>
        <button class="order-btn" data-ai="gemini" data-dir="left">‹</button>
        <button class="order-btn" data-ai="gemini" data-dir="right">›</button>
      </div>

      <span class="order-sep">→</span>

      <div class="order-chip">
        <span class="chip-num" id="order-claude">2</span>
        <span class="chip-name claude">Claude</span>
        <span class="dot dot-idle" id="dot-claude"></span>
        <button class="order-btn" data-ai="claude" data-dir="left">‹</button>
        <button class="order-btn" data-ai="claude" data-dir="right">›</button>
      </div>

    </div>
  </div>

  <div id="status-bar">Connecting…</div>

  <div id="chat-thread"></div>

  <div id="input-area">
    <div id="continue-row">
      <button id="continue-btn">Continue → Round <span id="next-round-num">2</span></button>
    </div>
    <div id="input-row">
      <textarea id="topic-input" rows="1"
        placeholder="Message the group… (Ctrl+Enter to send)"
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
    <div class="hint">
      <code>@ChatGPT</code> <code>@Gemini</code> <code>@Claude</code> to target specific AIs
      &nbsp;·&nbsp; <code>‹ ›</code> to reorder &nbsp;·&nbsp; Ctrl+Enter to send
    </div>
  </div>

</div>
<script src="group-chat.js"></script>
</body>
</html>
